# Default configuration for fMRI denoising pipeline

# Atlas Configuration
atlas:
  name: "schaefer_2018"
  resolution: 2  # mm (1 or 2)
  n_regions: 400  # Number of brain regions

# Denoising Parameters
denoising:
  smoothing_fwhm: 6.0  # mm
  detrend: true
  standardize: "zscore"  # options: zscore, psc, false
  low_pass: 0.1  # Hz
  high_pass: 0.01  # Hz
  t_r: null  # Will be read from BOLD header if null

# Confounds Configuration using nilearn load_confounds
confounds:
  strategy: ["motion", "compcor"]
  motion: "basic"  # options: basic, derivatives, power2, full
  compcor: "anat_combined"  # options: anat_combined, anat_separated, temp_combined, temp_separated
  n_compcor: 5  # Number of CompCor components
  global_signal: null  # options: basic, derivatives, power2, full
  high_pass: null  # Hz
  low_pass: null  # Hz
  cosine: null  # number or "full"
  scrub: null  # Number of volumes to remove
  fd_th: null  # Framewise displacement threshold
  dvars_th: null  # DVARS threshold
  tr: null  # Repetition time in seconds

# Output Configuration
output:
  directory: "./output"
  naming_pattern: "sub-{subject}_ses-{session}_task-{task}_run-{run}_atlas-{atlas_name}.csv"

# BIDS Configuration (optional, for BIDS-based file loading)
# If using BIDS mode, these parameters will be used to query the dataset
bids:
  dataset_path: null  # Path to BIDS dataset root (required for BIDS mode)
  task: null  # Task name (e.g., 'rest')
  space: "MNI152NLin2009cAsym"  # Space (e.g., 'MNI152NLin2009cAsym')
  desc: "preproc"  # Description (e.g., 'preproc')
  datatype: "func"
  extension: "nii.gz"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./logs/denoising.log"